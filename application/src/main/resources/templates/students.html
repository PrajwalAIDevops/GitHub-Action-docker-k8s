<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Students</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; max-width: 720px; }
    th, td { border: 1px solid #ddd; padding: 10px; }
    th { background: #f6f6f6; }
    .error { color: #b00020; }
    .message { color: #0b6b0b; }
    .card { padding: 16px; border: 1px solid #ddd; border-radius: 8px; max-width: 720px; }
    .row { margin-top: 16px; }
    label { display: inline-block; width: 80px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Students</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/courses">Courses</a>
    </nav>

    <p th:if="${message}" class="message" th:text="${message}"></p>
    <p th:if="${error}" class="error" th:text="${error}"></p>

    <table class="row">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Grade</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${students}">
          <td th:text="${s.id}"></td>
          <td th:text="${s.name}"></td>
          <td th:text="${s.grade}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
          <td colspan="3">No students found.</td>
        </tr>
      </tbody>
    </table>

    <div class="row">
      <h2>Add Student</h2>
      <form method="post" action="/students">
        <div>
          <label>Name</label>
          <input type="text" name="name" required />
        </div>
        <div style="margin-top: 8px;">
          <label>Grade</label>
          <input type="number" name="grade" min="1" max="12" required />
        </div>
        <div style="margin-top: 12px;">
          <button type="submit">Create</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
