name: CICD-pipline
on:
    push:
        branches: ["main"]
jobs:
    compile:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v4
            - name: setup jdk 17
              uses: actions/setup-java@v4
              with:
                java-version: "17"
                distribution: "temurin"
                cache: maven
            - name: Build with maven
              run: mvn -f application/pom.xml clean compile 
            - name: Run the test cases
              run: mvn -f application/pom.xml test
            - name: Pacakege the application
              run: mvn -f application/pom.xml package -DskipTests
    Scaning-and-docker-registory:
        runs-on: ubuntu-latest
        needs: compile
        steps:
            - name: Checkout the code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: RUN Gitleaks
              uses: gitleaks/gitleaks-action@v2
              
            - name: install trivy 
              run: |
                sudo apt-get install wget gnupg -y
                wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
                echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
                sudo apt-get update
                sudo apt-get install trivy -y
            - name: Scan the File-System 
              run: |
                trivy fs --format table --offline-scan .
                echo "KNOW WILL LOGIN TO DOCKER AND BUILD IMAGE AND PUSH TO DOCKER REPO"
            - name: docker login
              run: |
                echo "${{secrets.DOCKER_PASSWORD}}"| docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
                echo "Docker login successfully"
            - name: docker build 
              run: docker build -t "${{ secrets.DOCKER_REPO }}/app:v1" application
            - name: scan docker image
              run: trivy image "${{secrets.DOCKER_REPO}}/app:v1"
            - name: push to docker registory
              run: docker push "${{secrets.DOCKER_REPO}}/app:v1"

    deployment:
        runs-on: self-hosted
        needs: Scaning-and-docker-registory
        steps:
            - name: pull the docker image
              run: docker pull "${{secrets.DOCKER_REPO}}/app:v1"
            - name: stopd and remove old containers
              run: |
                    docker stop app || true 
                    docker rm -f app || true
            - name: docker run on port 8080
              run: docker run --name app -d -p 8080:8080 "${{secrets.DOCKER_REPO}}/app:v1"
